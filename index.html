<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumeo AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #1a1a1a; --surface2: #222;
      --border: rgba(255,255,255,.09); --border-hover: rgba(255,255,255,.18);
      --text: #f5f5f5; --muted: #888; --muted2: #555;
      --green: #22c55e; --green-bg: rgba(34,197,94,.12);
    }
    html { scroll-behavior: smooth; }
    body { font-family: Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; -webkit-font-smoothing:antialiased; }
    a { text-decoration:none; color:inherit; }

    /* NAV */
    .nav { position:sticky; top:0; z-index:100; background:rgba(13,13,13,.88); backdrop-filter:blur(18px); border-bottom:1px solid var(--border); }
    .nav-inner { max-width:1240px; margin:0 auto; padding:0 24px; height:64px; display:flex; align-items:center; gap:24px; }
    .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px; letter-spacing:-.02em; white-space:nowrap; }
    .nav-links { display:flex; gap:24px; list-style:none; flex:1; }
    .nav-links a { font-size:14px; color:var(--muted); transition:color .2s; }
    .nav-links a:hover { color:var(--text); }
    .nav-actions { display:flex; gap:10px; margin-left:auto; align-items:center; }

    /* Language switcher */
    .lang-switch { display:flex; align-items:center; gap:2px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:3px; }
    .lang-btn { padding:5px 9px; border-radius:6px; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; transition:background .15s,color .15s; letter-spacing:.04em; border:none; background:none; }
    .lang-btn.active { background:rgba(255,255,255,.12); color:var(--text); }
    .lang-btn:hover:not(.active) { color:var(--text); }

    .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 18px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:opacity .2s,background .2s; border:none; white-space:nowrap; }
    .btn:hover { opacity:.85; }
    .btn-outline { background:transparent; border:1px solid var(--border-hover); color:var(--text); }
    .btn-outline:hover { border-color:rgba(255,255,255,.3); }
    .btn-solid { background:var(--text); color:#000; }

    /* HERO */
    .hero-wrap { border-top:1px solid var(--border); }
    .hero { padding:88px 24px 72px; max-width:1240px; margin:0 auto; }
    .hero-badge { display:inline-flex; align-items:center; gap:8px; padding:6px 14px; border:1px solid var(--border-hover); border-radius:999px; font-size:12px; font-weight:600; letter-spacing:.08em; color:var(--muted); text-transform:uppercase; margin-bottom:32px; }
    .hero-badge-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); }
    .hero-cols { display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center; }
    .hero-title { font-size:clamp(36px,5vw,60px); font-weight:800; letter-spacing:-.04em; line-height:1.0; margin-bottom:20px; }
    .hero-title .accent { color:#c0a060; }
    .hero-desc { font-size:16px; color:var(--muted); max-width:480px; line-height:1.65; margin-bottom:32px; }
    .hero-actions { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:48px; }
    .hero-actions .btn { padding:13px 22px; font-size:15px; border-radius:9px; }
    .hero-metrics { display:flex; gap:24px; flex-wrap:wrap; }
    .metric { display:flex; align-items:center; gap:10px; }
    .metric-icon { width:34px; height:34px; border-radius:8px; background:var(--surface); border:1px solid var(--border); display:grid; place-items:center; font-size:14px; flex-shrink:0; }
    .metric-text { font-size:13px; color:var(--muted); line-height:1.35; }
    .metric-text b { display:block; color:var(--text); font-size:14px; }

    /* CHAT WIDGET */
    @keyframes fadeInUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes blink { 0%,80%,100% { opacity:.25; } 40% { opacity:1; } }
    @keyframes floatSlow { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-14px); } }
    .chat-widget { position:relative; max-width:380px; margin:0 auto; animation:floatSlow 7s ease-in-out infinite; }
    .chat-box { overflow:hidden; border-radius:16px; border:1px solid var(--border-hover); background:var(--surface); }
    .chat-head { display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--border); background:var(--surface2); }
    .chat-avatar { width:36px; height:36px; border-radius:50%; background:var(--bg); border:1px solid var(--border-hover); display:grid; place-items:center; font-size:13px; font-weight:700; color:var(--text); flex-shrink:0; }
    .chat-head-name { font-size:14px; font-weight:700; color:var(--text); }
    .chat-head-status { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--green); margin-top:2px; }
    .chat-head-status::before { content:""; width:6px; height:6px; border-radius:50%; background:var(--green); flex-shrink:0; }
    .chat-msgs { padding:16px; display:flex; flex-direction:column; gap:10px; }
    .cm { display:flex; opacity:0; animation:fadeInUp .4s ease both; }
    .cm.bot { justify-content:flex-start; }
    .cm.user { justify-content:flex-end; }
    .cm-bubble { max-width:78%; padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.55; color:var(--text); }
    .cm.bot .cm-bubble { background:var(--bg); border:1px solid var(--border); border-bottom-left-radius:3px; }
    .cm.user .cm-bubble { background:var(--border-hover); border-bottom-right-radius:3px; }
    .cm:nth-child(1) { animation-delay:.6s; }
    .cm:nth-child(2) { animation-delay:1.4s; }
    .cm:nth-child(3) { animation-delay:2.2s; }
    .cm:nth-child(4) { animation-delay:3.0s; }
    .cm:nth-child(5) { animation-delay:3.8s; }
    .typing-dots { display:flex; gap:4px; padding:10px 14px; background:var(--bg); border:1px solid var(--border); border-radius:12px; border-bottom-left-radius:3px; }
    .typing-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); animation:blink 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay:.22s; }
    .typing-dot:nth-child(3) { animation-delay:.44s; }

    /* SECTIONS */
    .section { max-width:1240px; margin:0 auto; padding:80px 24px; border-top:1px solid var(--border); }
    .section-label { text-align:center; font-size:13px; font-weight:600; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:12px; }
    .section-title { text-align:center; font-size:clamp(26px,4vw,42px); font-weight:800; letter-spacing:-.04em; margin-bottom:12px; }
    .section-sub { text-align:center; color:var(--muted); font-size:16px; margin-bottom:52px; }

    /* SERVICES */
    .services-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
    .service-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 24px; display:flex; flex-direction:column; transition:border-color .2s; }
    .service-card:hover { border-color:var(--border-hover); }
    .service-icon { width:44px; height:44px; margin-bottom:18px; display:grid; place-items:center; }
    .service-name { font-size:13px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .service-price { font-size:30px; font-weight:800; letter-spacing:-.04em; margin-bottom:20px; }
    .service-features { list-style:none; display:flex; flex-direction:column; gap:8px; flex:1; margin-bottom:24px; }
    .service-features li { font-size:13px; color:var(--muted); display:flex; align-items:flex-start; gap:8px; }
    .service-features li::before { content:"•"; color:var(--muted2); flex-shrink:0; }
    .service-cta { display:flex; align-items:center; justify-content:space-between; padding:12px 0 0; border-top:1px solid var(--border); font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; transition:color .2s; }
    .service-cta:hover { color:var(--text); }

    /* PROCESS */
    .process-steps { display:grid; grid-template-columns:repeat(5,1fr); gap:0; position:relative; }
    .process-steps::before { content:""; position:absolute; top:28px; left:calc(10% + 28px); right:calc(10% + 28px); height:1px; background:var(--border); }
    .process-step { display:flex; flex-direction:column; align-items:center; text-align:center; padding:0 12px; }
    .step-icon { width:56px; height:56px; background:var(--surface); border:1px solid var(--border-hover); border-radius:50%; display:grid; place-items:center; margin-bottom:18px; position:relative; z-index:1; flex-shrink:0; }
    .step-num { font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px; }
    .step-title { font-size:14px; font-weight:700; margin-bottom:6px; }
    .step-desc { font-size:12px; color:var(--muted); line-height:1.5; }

    /* FAQ */
    .faq-grid { display:grid; grid-template-columns:1fr 1fr; gap:0 24px; }
    .faq-item { border-bottom:1px solid var(--border); }
    .faq-q { display:flex; justify-content:space-between; align-items:center; padding:20px 0; font-size:15px; font-weight:500; cursor:pointer; gap:16px; user-select:none; }
    .faq-chevron { flex-shrink:0; width:20px; height:20px; display:grid; place-items:center; color:var(--muted); transition:transform .2s; }
    .faq-item.open .faq-chevron { transform:rotate(180deg); }
    .faq-a { font-size:14px; color:var(--muted); line-height:1.65; max-height:0; overflow:hidden; transition:max-height .3s ease,padding .3s; }
    .faq-item.open .faq-a { max-height:200px; padding-bottom:18px; }

    /* CTA */
    .cta-banner { border-top:1px solid var(--border); }
    .cta-inner { max-width:1240px; margin:0 auto; padding:72px 24px; display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center; }
    .cta-title { font-size:clamp(24px,3.5vw,38px); font-weight:800; letter-spacing:-.04em; line-height:1.1; margin-bottom:16px; }
    .cta-desc { font-size:15px; color:var(--muted); line-height:1.6; }

    /* CONTACT FORM */
    .cf-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 24px; }
    .cf-field { margin-bottom:18px; }
    .cf-label { display:block; font-size:13px; color:var(--muted); margin-bottom:7px; }
    .cf-input, .cf-textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:11px 14px; font-size:14px; color:var(--text); font-family:inherit; outline:none; transition:border-color .2s; }
    .cf-input:focus, .cf-textarea:focus { border-color:var(--border-hover); }
    .cf-input::placeholder, .cf-textarea::placeholder { color:var(--muted2); }
    .cf-textarea { resize:vertical; min-height:90px; }
    .cf-btn { width:100%; padding:13px; border-radius:9px; background:var(--text); border:none; color:#000; font-size:15px; font-weight:700; cursor:pointer; transition:opacity .2s; font-family:inherit; }
    .cf-btn:hover { opacity:.88; }
    .cf-btn:disabled { opacity:.45; cursor:not-allowed; }
    .cf-msg { margin-top:12px; font-size:13px; text-align:center; padding:10px; border-radius:8px; display:none; }
    .cf-msg.ok { display:block; background:var(--green-bg); color:var(--green); }
    .cf-msg.err { display:block; background:rgba(239,68,68,.12); color:#f87171; }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; z-index:999; background:rgba(0,0,0,.7); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; padding:24px; opacity:0; pointer-events:none; transition:opacity .25s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal-box { background:var(--surface); border:1px solid var(--border-hover); border-radius:20px; max-width:680px; width:100%; max-height:80vh; display:flex; flex-direction:column; transform:translateY(16px); transition:transform .25s; }
    .modal-overlay.open .modal-box { transform:translateY(0); }
    .modal-head { display:flex; align-items:center; justify-content:space-between; padding:22px 28px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .modal-title { font-size:17px; font-weight:700; letter-spacing:-.02em; }
    .modal-close { width:32px; height:32px; border-radius:8px; background:transparent; border:1px solid var(--border); color:var(--muted); cursor:pointer; display:grid; place-items:center; transition:border-color .2s,color .2s; flex-shrink:0; }
    .modal-close:hover { border-color:var(--border-hover); color:var(--text); }
    .modal-body { padding:28px; overflow-y:auto; flex:1; }
    .modal-body h3 { font-size:13px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin:24px 0 8px; }
    .modal-body h3:first-child { margin-top:0; }
    .modal-body p { font-size:14px; color:var(--muted); line-height:1.7; margin-bottom:8px; }
    .modal-body p span.placeholder { color:var(--muted2); font-style:italic; }
    .modal-updated { font-size:12px; color:var(--muted2); margin-top:24px; padding-top:16px; border-top:1px solid var(--border); }
    .contact-options { display:flex; flex-direction:column; gap:12px; }
    .contact-option { display:flex; align-items:center; gap:16px; padding:18px 20px; background:var(--bg); border:1px solid var(--border); border-radius:14px; cursor:pointer; text-decoration:none; color:var(--text); transition:border-color .2s,background .2s; }
    .contact-option:hover { border-color:var(--border-hover); background:var(--surface2); }
    .contact-option-icon { width:44px; height:44px; border-radius:10px; display:grid; place-items:center; flex-shrink:0; }
    .contact-option-info { display:flex; flex-direction:column; gap:3px; }
    .contact-option-label { font-size:13px; color:var(--muted); }
    .contact-option-value { font-size:15px; font-weight:600; }

    /* FOOTER */
    footer { border-top:1px solid var(--border); }
    .footer-main { max-width:1240px; margin:0 auto; padding:56px 24px 40px; display:grid; grid-template-columns:1fr 1fr 200px; gap:40px; }
    .footer-col-title { font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:18px; }
    .footer-links { list-style:none; display:flex; flex-direction:column; gap:10px; }
    .footer-links a { font-size:14px; color:var(--muted); transition:color .2s; }
    .footer-links a:hover { color:var(--text); }
    .footer-brand .logo { margin-bottom:12px; }
    .footer-brand-desc { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:20px; }
    .footer-socials { display:flex; gap:10px; }
    .social-btn { width:34px; height:34px; border-radius:8px; background:var(--surface); border:1px solid var(--border); display:grid; place-items:center; transition:border-color .2s; }
    .social-btn:hover { border-color:var(--border-hover); }
    .footer-bottom { max-width:1240px; margin:0 auto; padding:18px 24px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; }
    .footer-bottom-left { display:flex; align-items:center; gap:24px; flex-wrap:wrap; }
    .footer-contact { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--muted); }
    .footer-contact svg { opacity:.6; flex-shrink:0; }
    .footer-copy { font-size:13px; color:var(--muted2); }
    .footer-bottom-right { display:flex; gap:24px; }
    .footer-bottom-right a { font-size:13px; color:var(--muted2); transition:color .2s; }
    .footer-bottom-right a:hover { color:var(--muted); }

    /* RESPONSIVE */
    @media (max-width:1024px) {
      .services-grid { grid-template-columns:repeat(2,1fr); }
      .process-steps { grid-template-columns:repeat(3,1fr); gap:24px; }
      .process-steps::before { display:none; }
      .footer-main { grid-template-columns:1fr 1fr; }
    }
    @media (max-width:768px) {
      .nav-links { display:none; }
      .hero-cols { grid-template-columns:1fr; }
      .chat-widget { display:none; }
      .hero-metrics { gap:16px; }
      .services-grid { grid-template-columns:1fr; }
      .faq-grid { grid-template-columns:1fr; }
      .cta-inner { grid-template-columns:1fr; }
      .cta-inner { grid-template-columns:1fr; }
      .footer-main { grid-template-columns:1fr 1fr; }
      .process-steps { grid-template-columns:1fr 1fr; }
    }
    @media (max-width:520px) {
      .nav-actions .btn-outline { display:none; }
      .footer-main { grid-template-columns:1fr; }
      .process-steps { grid-template-columns:1fr; }
      .footer-bottom { flex-direction:column; align-items:flex-start; gap:12px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<header>
  <nav class="nav">
    <div class="nav-inner">
      <a href="#" class="logo">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none"><path d="M14 2L16.5 11.5L26 14L16.5 16.5L14 26L11.5 16.5L2 14L11.5 11.5L14 2Z" fill="white"/></svg>
        LUMEO AI
      </a>
      <ul class="nav-links">
        <li><a href="#services" data-i18n="nav.services"></a></li>
        <li><a href="#process" data-i18n="nav.howwork"></a></li>
        <li><a href="#faq" data-i18n="nav.faq"></a></li>
        <li><a href="#footer" data-i18n="nav.contacts"></a></li>
      </ul>
      <div class="nav-actions">
        <div class="lang-switch">
          <button class="lang-btn active" onclick="setLang('ru')">RU</button>
          <button class="lang-btn" onclick="setLang('lv')">LV</button>
          <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
        <a href="https://t.me/Orbitaru7" class="btn btn-outline">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
          <span data-i18n="nav.telegram"></span>
        </a>
        <a href="#services" class="btn btn-solid" data-i18n="nav.order"></a>
      </div>
    </div>
  </nav>
</header>

<!-- HERO -->
<div class="hero-wrap">
  <div class="hero">
    <div class="hero-badge">
      <span class="hero-badge-dot"></span>
      <span data-i18n="hero.badge"></span>
    </div>
    <div class="hero-cols">
      <div>
        <h1 class="hero-title" data-i18n-html="hero.title"></h1>
        <p class="hero-desc" data-i18n="hero.desc"></p>
        <div class="hero-actions">
          <a href="https://t.me/Orbitaru7" class="btn btn-outline">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            <span data-i18n="hero.btn1"></span>
          </a>
          <a href="#services" class="btn btn-outline" data-i18n="hero.btn2"></a>
        </div>
        <div class="hero-metrics">
          <div class="metric">
            <div class="metric-icon">🕐</div>
            <div class="metric-text"><b data-i18n="hero.m1v"></b><span data-i18n="hero.m1d"></span></div>
          </div>
          <div class="metric">
            <div class="metric-icon">📉</div>
            <div class="metric-text"><b data-i18n="hero.m2v"></b><span data-i18n="hero.m2d"></span></div>
          </div>
          <div class="metric">
            <div class="metric-icon">📈</div>
            <div class="metric-text"><b data-i18n="hero.m3v"></b><span data-i18n="hero.m3d"></span></div>
          </div>
          <div class="metric">
            <div class="metric-icon">✓</div>
            <div class="metric-text"><b data-i18n="hero.m4v"></b><span data-i18n="hero.m4d"></span></div>
          </div>
        </div>
      </div>

      <!-- Animated chat widget -->
      <div class="chat-widget">
        <div class="chat-box">
          <div class="chat-head">

let currentLang = 'ru';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
  const dict = T[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[key] !== undefined) el.textContent = dict[key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (dict[key] !== undefined) el.innerHTML = dict[key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (dict[key] !== undefined) el.placeholder = dict[key];
  });
  document.documentElement.lang = lang;
}

function toggleFaq(el) {
  const item = el.closest('.faq-item');
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(i => i.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}
